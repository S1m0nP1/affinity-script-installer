name: Submit a script
description: Suggest a script to add to the installer.
title: "[Script submission]: "
labels: ["script submission"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing a script. Please include enough detail for review.
  - type: input
    id: title
    attributes:
      label: Script title
      placeholder: "Vector Pattern FX"
    validations:
      required: true
  - type: input
    id: description
    attributes:
      label: Description
      placeholder: "What does the script do?"
    validations:
      required: true
  - type: input
    id: author
    attributes:
      label: Author handle
      placeholder: "S1m0nP1"
    validations:
      required: true
  - type: input
    id: script_url
    attributes:
      label: Script URL, gist, or fork branch
      description: Link to the script source if it is already published somewhere.
  - type: textarea
    id: script_source
    attributes:
      label: Script source or attachment
      description: Paste the script here, or drag and drop a .js file into this field.
    validations:
      required: true
  - type: textarea
    id: thumbnail
    attributes:
      label: Thumbnail image
      description: Optional PNG/WebP/JPEG preview. Drag and drop the image here, or paste a public image URL.
      placeholder: "Drag and drop a preview image here."
  - type: textarea
    id: translations
    attributes:
      label: Optional translations
      description: Add translated title and description if you can. Leave blank if you only have the original language.
      value: |
        es:
          title:
          description:
        fr:
          title:
          description:
        de:
          title:
          description:
  - type: input
    id: affinity_version
    attributes:
      label: Affinity version tested
      placeholder: "3.2+"
  - type: textarea
    id: safety_notes
    attributes:
      label: Safety notes
      description: Does the script use filesystem, network, AI, or destructive document operations?
  - type: checkboxes
    id: checks
    attributes:
      label: Submission checklist
      options:
        - label: I have tested this script in Affinity.
          required: true
        - label: I have permission to share this script publicly.
          required: true
        - label: The script includes metadata comments where possible.
          required: true
