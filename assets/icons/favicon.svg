<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Affinity Hub icon</title>
  <desc id="desc">A full-canvas dark green Affinity Hub app icon with a white lowercase a above the word Hub.</desc>
  <defs>
    <radialGradient id="green-core" cx="24%" cy="28%" r="96%">
      <stop offset="0%" stop-color="#4baa7a"/>
      <stop offset="42%" stop-color="#195238"/>
      <stop offset="100%" stop-color="#020806"/>
    </radialGradient>
    <linearGradient id="edge-light" x1="18%" y1="18%" x2="82%" y2="82%">
      <stop offset="0%" stop-color="#66c58e" stop-opacity="0.22"/>
      <stop offset="62%" stop-color="#0a281c" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="224" fill="url(#green-core)"/>
  <rect width="1024" height="1024" rx="224" fill="url(#edge-light)"/>
  <text
    x="512"
    y="585"
    fill="#ffffff"
    font-family="Arial Black, Helvetica Neue, Arial, sans-serif"
    font-size="660"
    font-weight="900"
    letter-spacing="-44"
    text-anchor="middle">a</text>
  <text
    x="512"
    y="822"
    fill="#ffffff"
    font-family="Arial Black, Helvetica Neue, Arial, sans-serif"
    font-size="160"
    font-weight="900"
    letter-spacing="8"
    text-anchor="middle">HUB</text>
</svg>
